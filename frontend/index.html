<!DOCTYPE html>
<html lang="zh" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioMiND</title>
  <link rel="stylesheet" href="/assets/style.css">

  <!-- Data and i18n (no fetch — loaded as <script> tags) -->
  <script src="/data/data.js"></script>
  <script src="/data/members.js"></script>

  <script src="/i18n/zh.js"></script>
  <script src="/i18n/en.js"></script>
  <style>
    /* ── Mobile responsive ── */
    @media (max-width: 767px) {
      #nav-desktop-items { display: none !important; }
      #nav-search-wrap   { display: none !important; }
      #hamburger-btn     { display: flex !important; }
    }
    @media (min-width: 768px) {
      #hamburger-btn     { display: none !important; }
      #mobile-nav-menu   { display: none !important; }
    }
    /* Home page responsive grids */
    .home-papers-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.25rem; }
    .home-dirs-grid   { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    @media (max-width: 639px) {
      .home-papers-grid { grid-template-columns: 1fr; }
      .home-dirs-grid   { grid-template-columns: repeat(2, 1fr); }
      .home-footer      { flex-direction: column !important; align-items: flex-start !important; gap: .75rem; }
      /* Chat panel: hide conv list on mobile so messages take full width */
      #conv-list        { display: none !important; }
    }
    /* Members grid: 2 cols on desktop */
    @media (min-width: 768px) {
      .members-grid { grid-template-columns: repeat(2, 1fr); }
    }
    /* News grid: 1 col mobile, 3 cols tablet+ */
    .news-grid { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
    @media (min-width: 640px) {
      .news-grid { grid-template-columns: repeat(3, 1fr); }
    }
    /* Line clamp utilities */
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    /* News card image zoom (legacy) */
    .news-card-img { transition: transform 0.3s ease; }
    .news-card:hover .news-card-img { transform: scale(1.04); }

    /* ── News page v2 ────────────────────────────────── */
    .news-hero-bg {
      background: linear-gradient(135deg, #0c1445 0%, #1e3a8a 60%, #1d4ed8 100%);
      position: relative; overflow: hidden;
      margin: -1.5rem -1rem 2rem;
    }
    .news-hero-bg::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.07) 1px, transparent 0);
      background-size: 28px 28px;
    }
    .news-hero-wm {
      position: absolute; right: -1rem; bottom: -.5rem;
      font-size: 8rem; font-weight: 900;
      color: rgba(255,255,255,.04); letter-spacing: -.3rem;
      line-height: 1; pointer-events: none; user-select: none;
    }
    .news-featured-card {
      display: grid; grid-template-columns: 3fr 2fr; min-height: 240px;
      background: white; border-radius: 1rem; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      cursor: pointer; transition: box-shadow .25s, transform .25s; position: relative;
    }
    .news-featured-card:hover { box-shadow: 0 10px 36px rgba(0,0,0,.14); transform: translateY(-2px); }
    @media (max-width: 639px) { .news-featured-card { grid-template-columns: 1fr; } }
    .news-grid-v2 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.25rem; }
    @media (max-width: 767px) { .news-grid-v2 { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 479px) { .news-grid-v2 { grid-template-columns: 1fr; } }
    .news-card-v2 {
      background: white; border-radius: .875rem; overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06); border: 1px solid #e5e7eb;
      cursor: pointer; transition: box-shadow .2s, transform .2s; position: relative;
    }
    .news-card-v2:hover { box-shadow: 0 6px 20px rgba(0,0,0,.1); transform: translateY(-2px); }
    .news-card-v2 { display: flex; flex-direction: column; }
    .news-card-content { flex: 1; display: flex; flex-direction: column; }
    .news-card-link { margin-top: auto !important; padding-top: .65rem; }
    .news-card-acts {
      position: absolute; top: .5rem; right: .5rem;
      display: flex; gap: 4px; opacity: 0; transition: opacity .2s;
    }
    .news-card-v2:hover .news-card-acts,
    .news-featured-card:hover .news-card-acts { opacity: 1; }
    .nca-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: none; cursor: pointer; font-size: .65rem; font-weight: 800;
      background: rgba(255,255,255,.93); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.18); transition: transform .15s;
    }
    .nca-btn:hover { transform: scale(1.12); }
    .news-card-img-v2 { transition: transform .35s ease; }
    .news-card-v2:hover .news-card-img-v2,
    .news-featured-card:hover .news-card-img-v2 { transform: scale(1.04); }

    /* ── Article detail page ─────────────────────────────────── */
    .article-breadcrumb {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: .55rem 1.5rem;
      font-size: 12.5px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .article-breadcrumb .ab-back {
      color: #2563eb;
      cursor: pointer;
      font-weight: 500;
    }
    .article-breadcrumb .ab-back:hover { text-decoration: underline; }
    .article-breadcrumb .ab-sep { color: #cbd5e1; }
    .article-breadcrumb .ab-title {
      color: #334155;
      max-width: 520px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .article-hero {
      background: linear-gradient(135deg, #0c1445 0%, #1e3a8a 55%, #1d4ed8 100%);
      position: relative;
      overflow: hidden;
      padding: 2.75rem 1.5rem 2.25rem;
      animation: artHeroIn .45s cubic-bezier(.22,1,.36,1) both;
    }
    .article-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.06) 1px, transparent 0);
      background-size: 28px 28px;
    }
    .article-hero-inner {
      position: relative;
      max-width: 780px;
      margin: 0 auto;
    }
    .article-hero-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: .9rem;
    }
    .art-tag {
      font-size: 11px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 12px;
      letter-spacing: .3px;
    }
    .art-tag-research { background: #dbeafe; color: #1d4ed8; }
    .art-tag-biz      { background: #fef3c7; color: #92400e; }
    .art-tag-date     { background: rgba(255,255,255,.12); color: #cbd5e1; }
    .article-hero-title {
      font-size: 1.65rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
      margin-bottom: .7rem;
      letter-spacing: -.25px;
    }
    .article-hero-excerpt {
      font-size: .925rem;
      color: #93c5fd;
      line-height: 1.65;
      max-width: 620px;
    }
    .article-hero-cover {
      margin-top: 1.75rem;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
      max-height: 360px;
    }
    .article-hero-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .article-hero-cover-placeholder {
      width: 100%;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      opacity: .15;
      color: #fff;
    }
    .article-body-wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      animation: artBodyIn .4s cubic-bezier(.22,1,.36,1) .12s both;
    }
    .article-body-card {
      background: #fff;
      border-radius: 16px;
      padding: 2.25rem 2.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      font-size: .95rem;
      line-height: 1.85;
      color: #374151;
    }
    .article-body-card h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1e293b;
      margin: 1.5rem 0 .55rem;
    }
    .article-body-card p { margin-bottom: .9rem; }
    .article-body-card img {
      max-width: 100%;
      border-radius: 8px;
      margin: 1.25rem 0 .4rem;
    }
    .article-source-footer {
      background: #f8fafc;
      border-radius: 10px;
      padding: .85rem 1.1rem;
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #e2e8f0;
      font-size: .82rem;
      color: #64748b;
    }
    .article-source-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }
    .article-source-footer a:hover { text-decoration: underline; }
    .article-related { margin-top: 2rem; }
    .article-related-label {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: .85rem;
    }
    .article-related-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .article-related-card {
      background: #fff;
      border-radius: 10px;
      padding: 1rem 1.1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .article-related-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
    }
    .article-related-card .arc-title {
      font-size: .875rem;
      font-weight: 600;
      color: #1e293b;
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .article-related-card .arc-date { font-size: .75rem; color: #94a3b8; }
    @keyframes artHeroIn {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes artBodyIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="h-full bg-gray-50 text-gray-900">

  <!-- Auth modal (login / register) -->
  <div id="auth-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.5)" onclick="hideAuthModal()">
    <div class="bg-white rounded-xl shadow-xl w-full mx-4" style="max-width:400px" onclick="event.stopPropagation()">
      <!-- Tabs + close button -->
      <div class="flex border-b border-gray-200 relative">
        <button id="tab-login"
          class="flex-1 py-3 text-sm font-medium text-blue-600 border-b-2 border-blue-600 transition"
          onclick="switchAuthTab('login')">
          <span data-i18n="auth.loginTab"></span>
        </button>
        <button id="tab-register"
          class="flex-1 py-3 text-sm font-medium text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition"
          onclick="switchAuthTab('register')">
          <span data-i18n="auth.registerTab"></span>
        </button>
        <button onclick="hideAuthModal()" class="absolute right-3 top-2.5 text-gray-400 hover:text-gray-700 text-lg leading-none">✕</button>
      </div>

      <div class="p-8">
        <!-- Login form -->
        <div id="auth-login-form">
          <input id="login-username" type="text" autocomplete="username"
            class="w-full border rounded-lg px-4 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            data-i18n-placeholder="auth.username">
          <input id="login-password" type="password" autocomplete="current-password"
            class="w-full border rounded-lg px-4 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            data-i18n-placeholder="auth.password">
          <p id="login-error" class="text-red-500 text-xs mb-3 hidden"></p>
          <button id="login-submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition"
            data-i18n="auth.loginBtn">
          </button>
        </div>

        <!-- Register form -->
        <div id="auth-register-form" class="hidden">
          <input id="reg-username" type="text" autocomplete="username"
            class="w-full border rounded-lg px-4 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            data-i18n-placeholder="auth.username">
          <input id="reg-password" type="password" autocomplete="new-password"
            class="w-full border rounded-lg px-4 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            data-i18n-placeholder="auth.passwordMin">
          <input id="reg-confirm" type="password" autocomplete="new-password"
            class="w-full border rounded-lg px-4 py-2 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            data-i18n-placeholder="auth.confirmPassword">
          <p id="reg-error" class="text-red-500 text-xs mb-3 hidden"></p>
          <button id="reg-submit"
            class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition"
            data-i18n="auth.registerBtn">
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Top navigation -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 flex items-center h-14">
      <span class="font-bold text-blue-700 text-lg mr-4 flex-shrink-0">BioMiND</span>
      <!-- Desktop nav items (hidden on mobile) -->
      <div id="nav-desktop-items" class="flex items-center gap-5">
        <button data-view="home" class="nav-btn text-sm font-medium text-gray-600 hover:text-blue-600 transition" data-i18n="nav.home"></button>
        <button data-view="timeline" class="nav-btn text-sm font-medium text-gray-600 hover:text-blue-600 transition" data-i18n="nav.timeline"></button>
        <button data-view="directions" class="nav-btn text-sm font-medium text-gray-600 hover:text-blue-600 transition" data-i18n="nav.directions"></button>
        <button data-view="sops" class="nav-btn text-sm font-medium text-gray-600 hover:text-blue-600 transition" data-i18n="nav.sops"></button>
        <button data-view="presentations" class="nav-btn text-sm font-medium text-gray-600 hover:text-blue-600 transition" data-i18n="nav.presentations"></button>
        <button data-view="members" class="nav-btn text-sm font-medium text-gray-600 hover:text-blue-600 transition" data-i18n="nav.members"></button>
        <button data-view="news" class="nav-btn text-sm font-medium text-gray-600 hover:text-blue-600 transition" data-i18n="nav.news"></button>
      </div>
      <!-- Right controls -->
      <div class="ml-auto flex items-center gap-2">
        <div id="nav-search-wrap">
          <input id="search-input" type="text" class="border rounded-lg px-3 py-1.5 text-sm w-48 focus:outline-none focus:ring-2 focus:ring-blue-500" data-i18n-placeholder="search.placeholder">
        </div>
        <button id="lang-toggle" class="text-sm text-gray-500 hover:text-gray-800 transition flex-shrink-0">中/EN</button>
        <span id="user-display" class="text-sm text-gray-600 font-medium hidden flex-shrink-0"></span>
        <button id="nav-login-btn" class="text-sm text-blue-600 font-medium hover:text-blue-800 transition hidden flex-shrink-0" data-i18n="auth.loginTab" onclick="showAuthModal()"></button>
        <button id="logout-btn" class="text-sm text-gray-400 hover:text-red-500 transition hidden flex-shrink-0" data-i18n="auth.logout"></button>
        <!-- Hamburger (mobile only) -->
        <button id="hamburger-btn" class="hidden flex-col justify-center items-center gap-1.5 p-2 ml-1" onclick="toggleMobileMenu()" aria-label="菜单">
          <span class="block w-5 h-0.5 bg-gray-600"></span>
          <span class="block w-5 h-0.5 bg-gray-600"></span>
          <span class="block w-5 h-0.5 bg-gray-600"></span>
        </button>
      </div>
    </div>
    <!-- Mobile dropdown menu -->
    <div id="mobile-nav-menu" class="hidden bg-white border-t border-gray-100 shadow-sm">
      <button data-view="home" class="nav-btn w-full text-left px-5 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 border-b border-gray-100" data-i18n="nav.home"></button>
      <button data-view="timeline" class="nav-btn w-full text-left px-5 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 border-b border-gray-100" data-i18n="nav.timeline"></button>
      <button data-view="directions" class="nav-btn w-full text-left px-5 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 border-b border-gray-100" data-i18n="nav.directions"></button>
      <button data-view="sops" class="nav-btn w-full text-left px-5 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 border-b border-gray-100" data-i18n="nav.sops"></button>
      <button data-view="presentations" class="nav-btn w-full text-left px-5 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 border-b border-gray-100" data-i18n="nav.presentations"></button>
      <button data-view="members" class="nav-btn w-full text-left px-5 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600 border-b border-gray-100" data-i18n="nav.members"></button>
      <button data-view="news" class="nav-btn w-full text-left px-5 py-3 text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-blue-600" data-i18n="nav.news"></button>
    </div>
  </nav>

  <!-- Main content area -->
  <main class="max-w-7xl mx-auto px-4 py-6">
    <div id="view-home" class="view hidden"></div>
    <div id="view-timeline" class="view hidden"></div>
    <div id="view-directions" class="view hidden"></div>
    <div id="view-sops" class="view hidden"></div>
    <div id="view-presentations" class="view hidden"></div>
    <div id="view-search" class="view hidden"></div>
    <div id="view-members" class="view hidden"></div>
    <div id="view-news" class="view hidden"></div>
  </main>

  <!-- News editor modal -->
  <div id="news-editor-modal" class="hidden fixed inset-0 z-50 overflow-y-auto" style="background:rgba(0,0,0,0.6)">
    <div class="flex min-h-full items-start justify-center py-8 px-4" onclick="if(event.target===this)closeNewsEditor()">
      <div class="bg-white rounded-2xl shadow-2xl w-full" style="max-width:680px" onclick="event.stopPropagation()">
        <!-- Header -->
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
          <h3 class="font-bold text-gray-900 text-base">文章编辑</h3>
          <button onclick="closeNewsEditor()" class="text-gray-400 hover:text-gray-700 text-xl leading-none">✕</button>
        </div>
        <!-- Form body -->
        <div class="p-6 space-y-4 overflow-y-auto" style="max-height:70vh">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1" data-i18n="news.editor.titleZh"></label>
            <input id="ne-title-zh" type="text" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1" data-i18n="news.editor.titleEn"></label>
            <input id="ne-title-en" type="text" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div class="grid gap-3" style="grid-template-columns:1fr 1fr 2fr">
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1" data-i18n="news.editor.date"></label>
              <input id="ne-date" type="date" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1" data-i18n="news.editor.source"></label>
              <input id="ne-source" type="text" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1" data-i18n="news.editor.sourceUrl"></label>
              <input id="ne-url" type="url" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1" data-i18n="news.editor.coverImage"></label>
            <div class="flex gap-2">
              <input id="ne-cover" type="text" placeholder="https://..." class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <label class="cursor-pointer flex-shrink-0 flex items-center gap-1 text-xs text-blue-600 font-medium border border-blue-200 rounded-lg px-3 py-2 hover:bg-blue-50">
                <span data-i18n="news.editor.uploadCover"></span>
                <input type="file" accept="image/*" class="hidden" onchange="uploadNewsCover(this)">
              </label>
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1" data-i18n="news.editor.excerptZh"></label>
            <textarea id="ne-excerpt-zh" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
          </div>
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="text-xs font-medium text-gray-600" data-i18n="news.editor.bodyZh"></label>
              <div class="flex items-center gap-3">
                <span id="ne-img-status" class="text-xs text-gray-400"></span>
                <label class="cursor-pointer text-xs text-blue-600 font-medium hover:text-blue-800">
                  <span data-i18n="news.editor.insertImage"></span>
                  <input type="file" accept="image/*" class="hidden" onchange="uploadNewsImage(this)">
                </label>
                <button type="button" onclick="toggleNePreview()" class="text-xs text-gray-500 hover:text-gray-800" data-i18n="news.editor.preview"></button>
              </div>
            </div>
            <textarea id="ne-body-zh" rows="12" class="w-full border rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"></textarea>
            <div id="ne-preview-wrap" class="hidden mt-2 border rounded-lg p-4 text-sm text-gray-700 bg-gray-50">
              <div id="ne-preview"></div>
            </div>
          </div>
          <details>
            <summary class="text-xs font-medium text-gray-500 cursor-pointer hover:text-gray-700 select-none">English content (optional)</summary>
            <div class="mt-3 space-y-3">
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1" data-i18n="news.editor.excerptEn"></label>
                <textarea id="ne-excerpt-en" rows="2" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-600 mb-1" data-i18n="news.editor.bodyEn"></label>
                <textarea id="ne-body-en" rows="6" class="w-full border rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"></textarea>
              </div>
            </div>
          </details>
          <p id="ne-error" class="text-red-500 text-xs hidden"></p>
        </div>
        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-100 flex items-center justify-between">
          <span id="ne-status" class="text-sm text-gray-400"></span>
          <div class="flex gap-3">
            <button type="button" onclick="closeNewsEditor()" class="px-4 py-2 text-sm text-gray-600 hover:text-gray-900" data-i18n="news.editor.cancel"></button>
            <button type="button" onclick="submitNewsArticle()" class="px-5 py-2 text-sm font-semibold text-white bg-blue-600 rounded-lg hover:bg-blue-700" data-i18n="news.editor.publish"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- AI Assistant FAB -->
  <button id="ai-fab" class="hidden fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-lg flex items-center justify-center text-2xl hover:bg-blue-700 transition z-30" title="AI 助手">✦</button>

  <!-- AI Chat Panel -->
  <div id="chat-panel" class="hidden fixed inset-y-0 right-0 z-50 flex" style="width:min(680px,100vw)">
    <div class="flex flex-col w-full bg-white shadow-2xl border-l border-gray-200">

      <!-- Panel header -->
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200 flex-shrink-0">
        <span class="font-semibold text-gray-800">✦ AI 助手</span>
        <div class="flex items-center gap-2">
          <button id="new-chat-btn"
            class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1 rounded-full transition">
            + 新对话
          </button>
          <button id="close-panel-btn"
            class="text-gray-400 hover:text-gray-700 text-lg leading-none transition">✕</button>
        </div>
      </div>

      <!-- Body -->
      <div class="flex flex-1 overflow-hidden">

        <!-- Conversation list -->
        <div id="conv-list"
          class="w-44 flex-shrink-0 border-r border-gray-100 overflow-y-auto bg-gray-50 text-sm">
        </div>

        <!-- Messages + input -->
        <div class="flex flex-col flex-1 overflow-hidden">
          <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-3"></div>

          <!-- Input row -->
          <div class="border-t border-gray-200 p-3 flex gap-2 flex-shrink-0">
            <textarea id="chat-input" rows="1"
              class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 resize-none"
              placeholder="问问 AI 助手… (Enter 发送, Shift+Enter 换行)"></textarea>
            <button id="chat-send"
              class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-blue-700 transition flex-shrink-0">
              发送
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Backdrop -->
  <div id="chat-backdrop" class="hidden fixed inset-0 z-40 bg-black/20" id="chat-backdrop"></div>

  <script src="/assets/app.js"></script>
</body>
</html>
